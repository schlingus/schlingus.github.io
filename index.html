<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>schlingus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>schlingus's: <span class="schlingus-cost">0</span></h3>
                <img src="./assets/schlingus.png" alt="" srcset="" class ="schlingus-image" onclick="incrementSchlingus()" draggable="false">
            </div> 
            <div class="right">

                <div class="upgrade" onclick="buyLuis()">
                    <div class="left-section">
                        <img src="./assets/luisgamercool23.png" alt="" srcset="" class="luis-upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>luisgamercool23</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="luis-cost">10</span></p>
                            <img src="./assets/schlingus.png" alt="" srcset="" class="schlingus-upgrade-img">
                        </div>
                    </div>
                    <div class="right-section">Level <span class ="luis-level">0</span></div>

                    <div class="next-level-info">
                        <p>      
                            +<span class="luis-increase">1</span> schlingus('s) <br /> per click<br>
                        </p>
                    </div>
                </div>
                
                <div class="upgrade" onclick="buyRedcliff()">
                    <div class="left-section">
                        <img src="./assets/redcliff.png" alt="" srcset="" class="luis-upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>knight of redcliff</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="redcliff-cost">100</span></p>
                            <img src="./assets/schlingus.png" alt="" srcset="" class="schlingus-upgrade-img">
                        </div>
                    </div>
                    <div class="right-section">Level <span class ="redcliff-level">0</span></div>

                    <div class="next-level-info">
                        <p>      
                            +<span class="redcliff-increase">5</span> schlingus('s) <br /> per second<br>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
