<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>schlingus clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>schlingus's: <span class="schlingus-cost">0</span></h3>
                <img src="./assets/schlingus.png" alt="" srcset="" class ="schlingus-image" onclick="incrementSchlingus()" draggable="false">
            </div> 
            <div class="right">

                <div class="upgrade" onclick="buyLuis()">
                    <div class="left-section">
                        <img src="./assets/luisgamercool23.png" alt="" srcset="" class="luis-upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>luisgamercool23</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="luis-cost">10</span></p>
                            <img src="./assets/schlingus.png" alt="" srcset="" class="schlingus-upgrade-img">
                        </div>
                    </div>
                    <div class="right-section">Level <span class ="luis-level">0</span></div>

                    <div class="next-level-info">
                        <p>      
                            +<span class="luis-increase">1</span> schlingus('s) <br /> per click<br>
                        </p>
                    </div>
                </div>
                
                <div class="upgrade" onclick="buyRedcliff()">
                    <div class="left-section">
                        <img src="./assets/redcliff.png" alt="" srcset="" class="redcliff-upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>knight of redcliff</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="redcliff-cost">100</span></p>
                            <img src="./assets/schlingus.png" alt="" srcset="" class="schlingus-upgrade-img">
                        </div>
                    </div>
                    <div class="right-section">Level <span class ="redcliff-level">0</span></div>

                    <div class="next-level-info">
                        <p>      
                            +<span class="redcliff-increase">10</span> schlingus('s) <br /> per click<br>
                        </p>
                    </div>
                </div>

                <div class="upgrade" onclick="buyMistrake()">
                    <div class="left-section">
                        <img src="./assets/mistrake.png" alt="" srcset="" class="mistrake-upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>mistrake (pro gambler)</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="mistrake-cost">500</span></p>       
                            <script>
                            function getRandomMistrakeIncrease() {
                                // Returns a random integer between 50 and 500 inclusive
                                return Math.floor(Math.random() * (500 - 50 + 1)) + 50;
                            }

                            // Initialize mistrake-increase value if not set
                            document.addEventListener('DOMContentLoaded', function() {
                                const mistrakeIncreaseSpan = document.querySelector('.mistrake-increase');
                                if (mistrakeIncreaseSpan && isNaN(parseInt(mistrakeIncreaseSpan.textContent))) {
                                    mistrakeIncreaseSpan.textContent = getRandomMistrakeIncrease();
                                }
                            });

                            function rerollMistrakeIncrease(e) {
                                e.stopPropagation();
                                const mistrakeIncreaseSpan = document.querySelector('.mistrake-increase');
                                const newValue = getRandomMistrakeIncrease();
                                mistrakeIncreaseSpan.textContent = newValue;
                            }

                            // Example: When buying mistrake, reroll the increase
                            function buyMistrake() {
                                // ... your existing buy logic ...
                                const mistrakeIncreaseSpan = document.querySelector('.mistrake-increase');
                                mistrakeIncreaseSpan.textContent = getRandomMistrakeIncrease();
                                // Make sure to use parseInt when reading this value elsewhere to avoid NaN
                            }
                            </script>
                            <img src="./assets/schlingus.png" alt="" srcset="" class="schlingus-upgrade-img">
                        </div>
                    </div>
                    <div class="right-section">Level <span class ="mistrake-level">0</span></div>

                    <div class="next-level-info">
                        <p>      
                            +<span class="mistrake-increase">50-500</span> schlingus('s) <br /> per second<br>

                        </p>
                    </div>
                </div>

            </div>
        </div>

        <div class="statistics">
            <div class="texts">
                <p>schlingus per click: <span id="spc-text">1</span></p>
                <p>schlingus per second: <span id="sps-text">0</span></p>
            </div>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
